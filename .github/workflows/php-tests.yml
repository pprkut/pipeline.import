name: PHP Tests
on: [push, pull_request, workflow_dispatch]

jobs:
  php-tests:
    uses: lunr-php/actions-templates/.github/workflows/php-library.yml@c1391d5e0077a2dee6c151ea8be35edcb2b31af8 # 0.14.2
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      coding-standard: 'Lunr'
      minimum-php-version: '8.3'
      php-extensions: uopz
      stable-php-versions: '["8.3"]'
      experimental-php-versions: '["8.4","8.5"]'
